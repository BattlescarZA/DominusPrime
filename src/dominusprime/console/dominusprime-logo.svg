<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Symbol -->
  <g transform="translate(0, 0)">
    <!-- Outer circle -->
    <circle cx="100" cy="100" r="95" fill="none" stroke="url(#logoGrad)" stroke-width="3"/>
    
    <!-- Crown/Prime symbol -->
    <path d="M 70 80 L 100 50 L 130 80 L 130 60 L 100 30 L 70 60 Z" fill="url(#logoGrad)"/>
    
    <!-- Letter D -->
    <path d="M 60 100 L 60 140 L 80 140 Q 100 140 100 120 Q 100 100 80 100 Z" fill="url(#logoGrad)"/>
    
    <!-- Letter P -->
    <path d="M 110 100 L 110 140 M 110 100 L 130 100 Q 140 100 140 110 Q 140 120 130 120 L 110 120" 
          fill="none" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Tech accent lines -->
    <line x1="50" y1="100" x2="40" y2="100" stroke="url(#logoGrad)" stroke-width="2"/>
    <line x1="150" y1="100" x2="160" y2="100" stroke="url(#logoGrad)" stroke-width="2"/>
    <line x1="100" y1="50" x2="100" y2="40" stroke="url(#logoGrad)" stroke-width="2"/>
    <line x1="100" y1="150" x2="100" y2="160" stroke="url(#logoGrad)" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="220" y="120" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#logoGrad)">
    DominusPrime
  </text>
  <text x="220" y="150" font-family="Arial, sans-serif" font-size="16" fill="#6B7280">
    AI Agent Framework
  </text>
</svg>
